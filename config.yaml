# MagicOrange 万能底座配置文件

# LLM 配置
llm:
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  max_retries: 3
  max_tokens: 4096
  model: deepseek-chat
  retry_delay: 1.0
  temperature: 0.7

# 工具配置
tools:
  disabled_toolsets: []
  enabled_toolsets:
  - terminal
  - file

# 会话配置
session:
  max_history: 100
  storage_dir: ~/.magic-orange/sessions

# 日志配置
logging:
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO


# MagicOrange 万能底座配置文件

# LLM 配置
llm:
  # API 配置 (OpenAI 兼容格式)
  api_key: "${OPENAI_API_KEY}"  # 从环境变量读取
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
  
  # 生成参数
  temperature: 0.7
  max_tokens: 4096
  
  # 重试配置
  max_retries: 3
  retry_delay: 1.0

# 工具配置
tools:
  # 启用的工具集
  enabled_toolsets:
    - terminal
    - file
  
  # 禁用的工具集
  disabled_toolsets: []

# 会话配置
session:
  # 会话存储目录
  storage_dir: "~/.magic-orange/sessions"
  
  # 最大历史消息数
  max_history: 100

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

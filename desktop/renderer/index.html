<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; }
#chat { height: calc(100vh - 60px); overflow-y: auto; padding: 16px; }
#chat .msg { margin: 8px 0; padding: 10px 14px; border-radius: 8px; max-width: 80%; }
#chat .user { background: #16213e; align-self: flex-end; margin-left: auto; }
#chat .bot { background: #0f3460; }
#input-bar { display: flex; gap: 8px; padding: 10px 16px; }
#input-bar input { flex: 1; padding: 10px; border: none; border-radius: 6px; }
#input-bar button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 6px; cursor: pointer; }
</style></head><body>
<div id="chat"></div>
<div id="input-bar">
<input id="msg-input" placeholder="输入消息..." autofocus />
<button id="send-btn">发送</button>
</div>
<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg-input");
const btn = document.getElementById("send-btn");

const ws = new WebSocket("ws://localhost:8765");
ws.onmessage = (e) => addMsg("bot", e.data);

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const text = input.value.trim();
  if (!text) return;
  addMsg("user", text);
  ws.send(text);
  input.value = "";
}

btn.onclick = send;
input.onkeydown = (e) => { if (e.key === "Enter") send(); };
</script>
</body></html>
